<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸Catatan Keuangan Dudu Bubu🧸</title>
    <!-- Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght=500;700&family=Pacifico&family=Comfortaa:wght=700&family=Patrick+Hand&display=swap" rel="stylesheet">
    
    <!-- LIBRARY GRAFIK (Chart.js) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* Fallback class styling jika file bubu-style.css belum termuat */
        .font-fredoka { font-family: 'Fredoka One', sans-serif; }
        .font-quicksand { font-family: 'Quicksand', sans-serif; }
        .font-pacifico { font-family: 'Pacifico', cursive; }
        .font-comfortaa { font-family: 'Comfortaa', cursive; }
        .font-patrick { font-family: 'Patrick Hand', cursive; }
        .font-cute { font-weight: bold; }
        .floating-gif {
            position: fixed;
            width: 75px;
            height: 75px;
            object-fit: contain;
            will-change: transform;
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }
    </style>
</head>
<body class="text-slate-700 min-h-screen pb-12 relative bg-[#FFF9E6] font-fredoka" id="mainBody">

    <!-- CONTAINER BACKGROUND ANIMASI GIF -->
    <div id="bg-container" class="fixed inset-0 pointer-events-none z-0 overflow-hidden"></div>

    <!-- AREA UTAMA YANG AKAN DI-DOWNLOAD -->
    <div id="cetak-area" class="relative min-h-screen bg-transparent z-10">
        <div class="max-w-5xl mx-auto p-4 sm:p-6 lg:p-8 relative">
            
            <!-- HEADER UTAMA WITH BUBU DUDU THEME -->
            <header class="mb-6 relative flex flex-col md:flex-row justify-between items-center gap-4 bg-white/95 backdrop-blur-xs p-6 rounded-3xl shadow-md border-4 border-[#FFDAB9]">
                <div class="flex items-center gap-4 text-center md:text-left">
                    <div class="w-16 h-16 bg-[#FEE180] rounded-full flex items-center justify-center text-3xl shadow-inner border-2 border-white animate-bounce">🐼</div>
                    <div>
                        <h1 class="text-2xl font-cute text-[#D2691E] tracking-wide">🎀 Jurnal Keuangan Bubu Dudu 🎀</h1>
                        <p class="text-xs text-rose-500 font-bold italic">Catat uang jajan & celengan impian biar ga boros beli bakso, mwah! 💖🍿</p>
                    </div>
                </div>

                <!-- KONTROL PENGATURAN & DOWNLOAD -->
                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto items-center data-html2pdf-ignore">
                    <!-- MENU PILIHAN FONT -->
                    <div class="bg-[#F0FFF4] p-3 rounded-2xl border-2 border-[#A7F3D0] flex flex-col items-center gap-1.5 w-full sm:w-40">
                        <label class="text-xs font-cute text-[#059669] flex items-center gap-1">🔤 Ganti Font:</label>
                        <select id="menuFont" onchange="gantiFontAplikasi(this.value)" class="text-xs font-bold p-1.5 bg-white border border-[#A7F3D0] rounded-xl focus:outline-none text-slate-700 cursor-pointer w-full">
                            <option value="font-fredoka">🧸 Fredoka One</option>
                            <option value="font-quicksand">🐾 Quicksand</option>
                            <option value="font-pacifico">🍦 Pacifico</option>
                            <option value="font-comfortaa">🍭 Comfortaa</option>
                            <option value="font-patrick">🎨 Patrick Hand</option>
                        </select>
                    </div>

                    <!-- MENU SUARA KETIK -->
                    <div class="bg-[#FFF0F5] p-3 rounded-2xl border-2 border-[#FFB6C1] flex flex-col items-center gap-1.5 w-full sm:w-40">
                        <label class="text-xs font-cute text-[#FF69B4] flex items-center gap-1">🎵 Suara Bubu Dudu:</label>
                        <select id="menuSuara" class="text-xs font-bold p-1.5 bg-white border border-[#FFB6C1] rounded-xl focus:outline-none text-slate-700 cursor-pointer w-full">
                            <option value="1">🐾 Suara 1 (Yatta!)</option>
                            <option value="2">🐾 Suara 2 (Wawaa)</option>
                            <option value="3">🐾 Suara 3 (Aaa~)</option>
                            <option value="OFF">🔇 Matikan Suara</option>
                        </select>
                    </div>

                    <!-- TOMBOL DOWNLOAD PDF -->
                    <button onclick="downloadPDF()" class="w-full sm:w-auto bg-amber-400 hover:bg-amber-500 text-white font-cute px-4 py-3 rounded-2xl transition shadow-md cursor-pointer text-xs flex items-center justify-center gap-1 border-2 border-white">
                        📥 Cetak PDF
                    </button>
                </div>

                <!-- Navigasi Mode Aplikasi -->
                <div class="flex bg-[#FDF5E6] p-1.5 rounded-2xl w-full md:w-64 border-2 border-[#FFE4C4] shrink-0 data-html2pdf-ignore">
                    <button id="tabKeuangan" onclick="switchMode('keuangan')" class="w-1/2 py-2 text-xs font-cute rounded-xl transition-all cursor-pointer bg-[#FFB6C1] text-white shadow-sm">📈 Harian</button>
                    <button id="tabTabungan" onclick="switchMode('tabungan')" class="w-1/2 py-2 text-xs font-cute rounded-xl transition-all cursor-pointer text-[#CD853F] hover:text-[#D2691E]">🐷 Celengan</button>
                </div>
            </header>

            <!-- KARTU RINGKASAN SALDO / SUMMARY -->
            <section id="summarySection" class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6"></section>

            <!-- GRID UTAMA: FORM & TABEL -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                
                <!-- INPUT FORM FORMULIR -->
                <div class="bg-white/95 backdrop-blur-xs p-5 rounded-3xl shadow-md border-4 border-[#FFDAB9] lg:col-span-1 data-html2pdf-ignore">
                    <h2 id="formTitle" class="text-md font-cute text-[#D2691E] mb-4 flex items-center gap-1.5">📝 Tambah Catatan</h2>
                    
                    <form id="mainForm" class="space-y-3.5">
                        <input type="hidden" id="dataId">
                        
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">📅 Tanggal</label>
                            <input type="date" id="tanggal" required class="w-full text-xs p-2.5 border-2 border-[#FFDAB9] rounded-xl focus:outline-none focus:border-[#FFB6C1]">
                        </div>

                        <div>
                            <label id="labelToko" class="block text-xs font-bold text-slate-500 mb-1">🏪 Toko / Sumber Uang</label>
                            <input type="text" id="namaToko" required placeholder="Misal: Warung Bakso / Gaji Bulanan" class="input-efek-suara w-full text-xs p-2.5 border-2 border-[#FFDAB9] rounded-xl focus:outline-none focus:border-[#FFB6C1]">
                        </div>

                        <div>
                            <label id="labelDetail" class="block text-xs font-bold text-slate-500 mb-1">🍭 Keterangan Barang</label>
                            <input type="text" id="keterangan" required placeholder="Misal: Beli bakso urat 2 porsi" class="input-efek-suara w-full text-xs p-2.5 border-2 border-[#FFDAB9] rounded-xl focus:outline-none focus:border-[#FFB6C1]">
                        </div>

                        <div id="kategoriContainer">
                            <label class="block text-xs font-bold text-slate-500 mb-1">🧸 Kategori</label>
                            <select id="kategori" class="w-full text-xs p-2.5 border-2 border-[#FFDAB9] rounded-xl focus:outline-none bg-white">
                                <option value="Makanan">🍲 Makanan & Minuman</option>
                                <option value="Mainan">🎮 Game & Hiburan</option>
                                <option value="Kebutuhan">📝 Kuliah / Kebutuhan</option>
                                <option value="Umum">🧸 Umum / Lainnya</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">🔄 Jenis Aliran</label>
                            <select id="jenis" class="w-full text-xs p-2.5 border-2 border-[#FFDAB9] rounded-xl focus:outline-none bg-white">
                                <!-- Opsi disuntikkan dinamis lewat JS -->
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">💰 Jumlah & Mata Uang</label>
                            <div class="flex gap-2">
                                <input type="number" id="jumlah" required step="any" placeholder="0" class="input-efek-suara w-2/3 text-xs p-2.5 border-2 border-[#FFDAB9] rounded-xl focus:outline-none focus:border-[#FFB6C1]">
                                <select id="mataUang" class="w-1/3 text-xs p-2.5 border-2 border-[#FFDAB9] rounded-xl focus:outline-none bg-white">
                                    <option value="IDR">Rupiah</option>
                                    <option value="USD">USD ($)</option>
                                    <option value="CENT">Gold Cent</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">💬 Alasan / Catatan Tambahan</label>
                            <textarea id="alasan" rows="2" placeholder="Alasan khilaf..." class="input-efek-suara w-full text-xs p-2.5 border-2 border-[#FFDAB9] rounded-xl focus:outline-none focus:border-[#FFB6C1]"></textarea>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-[#FFB6C1] hover:bg-[#FF9999] text-white font-cute p-3 rounded-xl transition shadow-xs text-xs cursor-pointer">
                            Simpan Transaksi ✨
                        </button>
                        <button type="button" id="cancelBtn" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-500 font-bold p-2 rounded-xl transition text-xs hidden cursor-pointer">
                            Batal Edit
                        </button>
                    </form>
                </div>

                <!-- BLOK HISTORI DATA / TABEL -->
                <div class="bg-white/95 backdrop-blur-xs p-5 rounded-3xl shadow-md border-4 border-[#FFDAB9] lg:col-span-2 overflow-hidden">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4 data-html2pdf-ignore">
                        <h2 id="tableTitle" class="text-md font-cute text-[#D2691E]">📈 Histori Keuangan Bulanan</h2>
                        
                        <!-- MENYUNTIKKAN MENU TRANSAKSI BULANAN (FILTER DATA) -->
                        <div id="kategoriContainerBulan" class="flex items-center gap-1.5 bg-[#FFF5EE] px-3 py-1.5 rounded-2xl border border-[#FFDAB9]">
                            <label for="filterBulan" class="text-[11px] font-bold text-[#CD853F] whitespace-nowrap">📅 Periode:</label>
                            <select id="filterBulan" class="text-[11px] font-bold bg-white text-slate-700 border border-[#FFDAB9] rounded-xl p-1 outline-none cursor-pointer">
                                <option value="SEMUA">📈 Semua (Total Akumulatif)</option>
                                <option value="01">Januari</option>
                                <option value="02">Februari</option>
                                <option value="03">Maret</option>
                                <option value="04">April</option>
                                <option value="05">Mei</option>
                                <option value="06">Juni</option>
                                <option value="07">Juli</option>
                                <option value="08">Agustus</option>
                                <option value="09">September</option>
                                <option value="10">Oktober</option>
                                <option value="11">November</option>
                                <option value="12">Desember</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- ==================== WADAH GRAFIK BARU (CHART CONTAINER) ==================== -->
                    <div class="mb-5 p-4 bg-[#FFFBF0] rounded-2xl border border-[#FFDAB9] data-html2pdf-ignore">
                        <canvas id="grafikKeuangan" class="max-h-56 w-full"></canvas>
                    </div>
                    <!-- ============================================================================== -->
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr id="tableHeaderRow" class="bg-[#FFF5EE] text-[#CD853F] text-[11px] font-bold border-b-2 border-[#FFDAB9]">
                                    <!-- Header kolom diatur lewat JS -->
                                </tr>
                            </thead>
                            <tbody id="tabelBody">
                                <!-- Data di-render lewat JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- CUSTOM MODAL DIALOG POPUP (BUBU STYLED) -->
    <div id="customModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-xs opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="modalBox" class="bg-white w-full max-w-sm p-6 rounded-3xl border-4 border-[#FFDAB9] text-center shadow-2xl transform scale-95 transition-transform duration-300">
            <div id="modalIcon" class="text-4xl mb-2 animate-bounce">🧸</div>
            <h3 id="modalTitle" class="text-lg font-cute text-[#D2691E] mb-2"></h3>
            <p id="modalMessage" class="text-xs text-slate-500 mb-5 leading-relaxed"></p>
            <div id="modalActionButtons" class="flex flex-col sm:flex-row gap-2.5"></div>
        </div>
    </div>

    <!-- Hubungkan script aplikasi utama -->
    <script src="bubu-app.js"></script>
</body>
</html>
