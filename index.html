<!-- JAVASCRIPT LOGIC (FIXED, OPTIMIZED & CURRENCY CONVERTER INTEGRATED) -->
<script>
    // Storage data initialization
    let currentMode = 'keuangan'; // 'keuangan' atau 'tabungan'
    let dbKeuangan = JSON.parse(localStorage.getItem('jurnalKeuangan')) || [];
    let dbTabungan = JSON.parse(localStorage.getItem('jurnalTabungan')) || [];
    
    const form = document.getElementById('mainForm');
    let pendingDeleteId = null;

    // KURS UPDATE TERKINI (2026)
    const KURS_USD_TO_IDR = 17994.40;
    const KURS_CENT_TO_IDR = 179.944;

    // Sound FX System using Web Audio API
    function playSuccessSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
            gain1.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.15);

            setTimeout(() => {
                let osc2 = audioCtx.createOscillator();
                let gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
                gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.2);
            }, 70);
        } catch(e) { console.log("AudioContext not supported or blocked"); }
    }

    function formatRupiah(angka) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
    }

    // Custom Central Modal Handler
    function showModal({ title, message, type, confirmText, onConfirm, showCancel = true }) {
        const modal = document.getElementById('customModal');
        const box = document.getElementById('modalBox');
        const mTitle = document.getElementById('modalTitle');
        const mMsg = document.getElementById('modalMessage');
        const mIcon = document.getElementById('modalIcon');
        const btnContainer = document.getElementById('modalActionButtons');

        mTitle.innerText = title;
        mMsg.innerText = message;
        btnContainer.innerHTML = '';

        if (type === 'danger') {
            mIcon.className = "mx-auto flex items-center justify-center h-12 w-12 rounded-full mb-4 bg-red-100 text-red-600";
            mIcon.innerHTML = `⚠️`;
        } else if (type === 'success') {
            mIcon.className = "mx-auto flex items-center justify-center h-12 w-12 rounded-full mb-4 bg-green-100 text-green-600";
            mIcon.innerHTML = `✓`;
        } else {
            mIcon.className = "mx-auto flex items-center justify-center h-12 w-12 rounded-full mb-4 bg-amber-100 text-amber-600";
            mIcon.innerHTML = `ℹ️`;
        }

        const cBtn = document.createElement('button');
        cBtn.className = `w-full text-white p-2 rounded-xl font-bold transition cursor-pointer text-sm ${type === 'danger' ? 'bg-red-600 hover:bg-red-700' : 'bg-slate-800 hover:bg-slate-900'}`;
        cBtn.innerText = confirmText || 'OK';
        cBtn.onclick = () => {
            closeModal();
            if (onConfirm) onConfirm();
        };
        btnContainer.appendChild(cBtn);

        if (showCancel) {
            const cancelBtn = document.createElement('button');
            cancelBtn.className = "w-full bg-slate-200 text-slate-700 p-2 rounded-xl font-bold hover:bg-slate-300 transition cursor-pointer text-sm";
            cancelBtn.innerText = 'Batal';
            cancelBtn.onclick = closeModal;
            btnContainer.appendChild(cancelBtn);
        }

        modal.classList.remove('pointer-events-none', 'opacity-0');
        modal.classList.add('opacity-1');
        box.classList.remove('scale-95');
        box.classList.add('scale-100');
    }

    function closeModal() {
        const modal = document.getElementById('customModal');
        const box = document.getElementById('modalBox');
        modal.classList.add('pointer-events-none', 'opacity-0');
        modal.classList.remove('opacity-1');
        box.classList.add('scale-95');
        box.classList.remove('scale-100');
    }

    // Mode Navigation Controller
    function switchMode(mode) {
        currentMode = mode;
        const btnKeuangan = document.getElementById('tabKeuangan');
        const btnTabungan = document.getElementById('tabTabungan');
        
        resetForm();

        if (mode === 'keuangan') {
            btnKeuangan.className = "w-1/2 py-2 text-sm font-bold rounded-lg transition-all cursor-pointer bg-amber-400 text-slate-900 shadow-sm";
            btnTabungan.className = "w-1/2 py-2 text-sm font-bold rounded-lg transition-all cursor-pointer text-slate-600 hover:text-slate-900";
            
            document.getElementById('labelToko').innerText = "Nama Toko / Instansi Sumber";
            document.getElementById('labelDetail').innerText = "Detail Barang / Keterangan";
            document.getElementById('kategoriContainer').classList.remove('hidden');
            document.getElementById('tableTitle').innerText = "📈 Histori Transaksi Bulan Ini";
        } else {
            btnTabungan.className = "w-1/2 py-2 text-sm font-bold rounded-lg transition-all cursor-pointer bg-amber-400 text-slate-900 shadow-sm";
            btnKeuangan.className = "w-1/2 py-2 text-sm font-bold rounded-lg transition-all cursor-pointer text-slate-600 hover:text-slate-900";
            
            document.getElementById('labelToko').innerText = "Nama Akun Tabungan / Wadah";
            document.getElementById('labelDetail').innerText = "Tujuan / Goal Menabung";
            document.getElementById('kategoriContainer').classList.add('hidden');
            document.getElementById('tableTitle').innerText = "🐷 Histori Aliran Celengan Tabungan";
        }

        renderView();
    }

    function renderView() {
        const summary = document.getElementById('summarySection');
        const headerRow = document.getElementById('tableHeaderRow');
        const tbody = document.getElementById('tabelBody');
        
        // Set input date to today default if empty
        if(!document.getElementById('tanggal').value) {
            document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];
        }
        
        tbody.innerHTML = '';

        if (currentMode === 'keuangan') {
            document.getElementById('jenis').innerHTML = `
                <option value="Pengeluaran">💸 Pengeluaran (Uang Keluar)</option>
                <option value="Pemasukan">💰 Pemasukan (Uang Masuk)</option>
            `;

            headerRow.innerHTML = `
                <th class="p-3">Tanggal</th>
                <th class="p-3">Toko/Tempat</th>
                <th class="p-3">Detail/Keterangan</th>
                <th class="p-3">Alasan Keperluan</th>
                <th class="p-3">Kategori</th>
                <th class="p-3">Jenis</th>
                <th class="p-3 text-right">Jumlah</th>
                <th class="p-3 text-center">Aksi</th>
            `;

            let totalPemasukan = dbKeuangan.filter(x => x.jenis === 'Pemasukan').reduce((acc, c) => acc + parseFloat(c.jumlah), 0);
            let totalPengeluaran = dbKeuangan.filter(x => x.jenis === 'Pengeluaran').reduce((acc, c) => acc + parseFloat(c.jumlah), 0);
            let saldoAkhir = totalPemasukan - totalPengeluaran;

            summary.innerHTML = `
                <div class="bg-emerald-50/90 p-4 rounded-xl border border-emerald-200 shadow-xs">
                    <p class="text-xs font-bold text-emerald-600 uppercase tracking-wider">Total Pemasukan</p>
                    <p class="text-2xl font-black text-emerald-700">${formatRupiah(totalPemasukan)}</p>
                </div>
                <div class="bg-rose-50/90 p-4 rounded-xl border border-rose-200 shadow-xs">
                    <p class="text-xs font-bold text-rose-600 uppercase tracking-wider">Total Pengeluaran</p>
                    <p class="text-2xl font-black text-rose-700">${formatRupiah(totalPengeluaran)}</p>
                </div>
                <div class="bg-amber-50/90 p-4 rounded-xl border border-amber-200 shadow-xs">
                    <p class="text-xs font-bold text-amber-700 uppercase tracking-wider">Saldo Dompet Akhir</p>
                    <p class="text-2xl font-black text-slate-800">${formatRupiah(saldoAkhir)}</p>
                </div>
            `;

            dbKeuangan.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
            if (dbKeuangan.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-4 text-center text-slate-400 italic">Belum ada transaksi tercatat.</td></tr>`;
            } else {
                dbKeuangan.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50/80 border-b border-slate-100 transition";
                    tr.innerHTML = `
                        <td class="p-3 whitespace-nowrap">${item.tanggal}</td>
                        <td class="p-3 font-semibold text-slate-800">${item.namaToko || '-'}</td>
                        <td class="p-3">${item.keterangan}</td>
                        <td class="p-3 max-w-[150px] truncate" title="${item.alasan || '-'}">${item.alasan || '<span class="text-slate-300">-</span>'}</td>
                        <td class="p-3"><span class="px-2 py-0.5 text-xs bg-slate-200 text-slate-700 rounded-full font-medium">${item.kategori}</span></td>
                        <td class="p-3 font-bold ${item.jenis === 'Pemasukan' ? 'text-emerald-600' : 'text-rose-600'}">${item.jenis}</td>
                        <td class="p-3 text-right font-bold text-slate-800">${formatRupiah(item.jumlah)}</td>
                        <td class="p-3 text-center space-x-1 whitespace-nowrap">
                            <button onclick="siapkanEdit('${item.id}')" class="text-blue-600 hover:text-blue-800 font-bold px-1.5 py-1 cursor-pointer">Edit</button>
                            <button onclick="mintaHapus('${item.id}')" class="text-rose-600 hover:text-rose-800 font-bold px-1.5 py-1 cursor-pointer">Hapus</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }

        } else {
            document.getElementById('jenis').innerHTML = `
                <option value="Simpanan">📥 Masukkan ke Tabungan (+)</option>
                <option value="Penarikan">📤 Ambil dari Tabungan (-)</option>
            `;

            headerRow.innerHTML = `
                <th class="p-3">Tanggal</th>
                <th class="p-3">Nama Celengan/Wadah</th>
                <th class="p-3">Target / Goal</th>
                <th class="p-3">Alasan Detail</th>
                <th class="p-3">Jenis Aliran</th>
                <th class="p-3 text-right">Jumlah</th>
                <th class="p-3 text-center">Aksi</th>
            `;

            let totalSimpanan = dbTabungan.filter(x => x.jenis === 'Simpanan').reduce((acc, c) => acc + parseFloat(c.jumlah), 0);
            let totalPenarikan = dbTabungan.filter(x => x.jenis === 'Penarikan').reduce((acc, c) => acc + parseFloat(c.jumlah), 0);
            let totalCelengan = totalSimpanan - totalPenarikan;

            summary.innerHTML = `
                <div class="bg-amber-100/80 p-4 rounded-xl border border-amber-300 shadow-xs md:col-span-3 text-center">
                    <p class="text-xs font-bold text-amber-800 uppercase tracking-wider">Total Seluruh Celengan Tabungan Berjalan</p>
                    <p class="text-3xl font-black text-amber-900">${formatRupiah(totalCelengan)}</p>
                </div>
            `;

            dbTabungan.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
            if (dbTabungan.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-slate-400 italic">Belum ada target simpanan celengan.</td></tr>`;
            } else {
                dbTabungan.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50/80 border-b border-slate-100 transition";
                    tr.innerHTML = `
                        <td class="p-3 whitespace-nowrap">${item.tanggal}</td>
                        <td class="p-3 font-semibold text-slate-800">${item.namaToko || '-'}</td>
                        <td class="p-3">${item.keterangan}</td>
                        <td class="p-3 max-w-[150px] truncate" title="${item.alasan || '-'}">${item.alasan || '<span class="text-slate-300">-</span>'}</td>
                        <td class="p-3 font-bold ${item.jenis === 'Simpanan' ? 'text-amber-600' : 'text-slate-500'}">${item.jenis === 'Simpanan' ? '📥 Simpan' : '📤 Ambil'}</td>
                        <td class="p-3 text-right font-bold text-slate-800">${formatRupiah(item.jumlah)}</td>
                        <td class="p-3 text-center space-x-1 whitespace-nowrap">
                            <button onclick="siapkanEdit('${item.id}')" class="text-blue-600 hover:text-blue-800 font-bold px-1.5 py-1 cursor-pointer">Edit</button>
                            <button onclick="mintaHapus('${item.id}')" class="text-rose-600 hover:text-rose-800 font-bold px-1.5 py-1 cursor-pointer">Hapus</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const id = document.getElementById('dataId').value;
        const tanggal = document.getElementById('tanggal').value;
        const namaToko = document.getElementById('namaToko').value;
        const keterangan = document.getElementById('keterangan').value;
        const alasan = document.getElementById('alasan').value;
        const kategori = document.getElementById('kategori').value;
        const jenis = document.getElementById('jenis').value;
        
        // AMBIL INPUT MATA UANG (Pastikan di HTML elemen ID 'mataUang' sudah ada, default ke IDR jika belum ada)
        const elemenMataUang = document.getElementById('mataUang');
        const jenisMataUang = elemenMataUang ? elemenMataUang.value : 'IDR';
        
        let jumlahInput = parseFloat(document.getElementById('jumlah').value) || 0;
        let jumlah = jumlahInput;

        // LOGIKA INTERSEPSI DAN KONVERSI MATA UANG OTOMATIS
        if (jenisMataUang === 'USD') {
            jumlah = Math.round(jumlahInput * KURS_USD_TO_IDR);
        } else if (jenisMataUang === 'CENT') {
            jumlah = Math.round(jumlahInput * KURS_CENT_TO_IDR);
        }

        if (id) {
            // Submit Edit Update Data
            if (currentMode === 'keuangan') {
                dbKeuangan = dbKeuangan.map(x => x.id === id ? { id, tanggal, namaToko, keterangan, alasan, kategori, jenis, jumlah } : x);
                localStorage.setItem('jurnalKeuangan', JSON.stringify(dbKeuangan));
            } else {
                dbTabungan = dbTabungan.map(x => x.id === id ? { id, tanggal, namaToko, keterangan, alasan, jenis, jumlah } : x);
                localStorage.setItem('jurnalTabungan', JSON.stringify(dbTabungan));
            }
            
            showModal({
                title: "Berhasil Diubah",
                message: "Transaksi kamu berhasil diperbarui di memori browser!",
                type: "success",
                showCancel: false
            });
        } else {
            // Submit New Data Insert
            const dataBaru = {
                id: Date.now().toString(),
                tanggal, namaToko, keterangan, alasan, kategori, jenis, jumlah
            };

            if (currentMode === 'keuangan') {
                dbKeuangan.push(dataBaru);
                localStorage.setItem('jurnalKeuangan', JSON.stringify(dbKeuangan));
            } else {
                dbTabungan.push(dataBaru);
                localStorage.setItem('jurnalTabungan', JSON.stringify(dbTabungan));
            }
        }

        playSuccessSound();
        resetForm();
        renderView();
    });

    function siapkanEdit(id) {
        let database = currentMode === 'keuangan' ? dbKeuangan : dbTabungan;
        const target = database.find(x => x.id === id);
        if (!target) return;

        showModal({
            title: "Masuk Mode Edit?",
            message: `Kamu akan mengubah data terkait "${target.keterangan || target.namaToko}". Formulir kiri siap disesuaikan.`,
            type: "info",
            confirmText: "Siapkan Edit",
            onConfirm: () => {
                document.getElementById('dataId').value = target.id;
                document.getElementById('tanggal').value = target.tanggal;
                document.getElementById('namaToko').value = target.namaToko;
                document.getElementById('keterangan').value = target.keterangan;
                document.getElementById('alasan').value = target.alasan || '';
                document.getElementById('jenis').value = target.jenis;
                document.getElementById('jumlah').value = target.jumlah; // Edit akan otomatis memuat nilai IDR bersih yang tersimpan
                if (currentMode === 'keuangan') document.getElementById('kategori').value = target.kategori;

                // Reset pilihan mata uang kembali ke IDR saat mode edit agar tidak memicu double conversion secara tidak sengaja
                const elemenMataUang = document.getElementById('mataUang');
                if (elemenMataUang) elemenMataUang.value = 'IDR';

                document.getElementById('formTitle').innerText = "🔄 Mode Edit Data";
                document.getElementById('submitBtn').innerText = "Simpan Perubahan";
                document.getElementById('cancelBtn').classList.remove('hidden');
            }
        });
    }

    function resetForm() {
        form.reset();
        document.getElementById('dataId').value = '';
        document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];
        document.getElementById('formTitle').innerText = "📝 Tambah Catatan";
        document.getElementById('submitBtn').innerText = currentMode === 'keuangan' ? "Simpan Transaksi" : "Simpan Tabungan";
        document.getElementById('cancelBtn').classList.add('hidden');
        
        const elemenMataUang = document.getElementById('mataUang');
        if (elemenMataUang) elemenMataUang.value = 'IDR';
    }

    function mintaHapus(id) {
        pendingDeleteId = id;
        let database = currentMode === 'keuangan' ? dbKeuangan : dbTabungan;
        const target = database.find(x => x.id === id);
        
        showModal({
            title: "Hapus Catatan Ini?",
            message: `Tindakan ini permanen. Catatan "${target.keterangan}" seharga ${formatRupiah(target.jumlah)} akan terhapus total dari browser.`,
            type: "danger",
            confirmText: "Ya, Hapus Data",
            onConfirm: eksekusiHapus
        });
    }

    function eksekusiHapus() {
        if (!pendingDeleteId) return;
        
        if (currentMode === 'keuangan') {
            dbKeuangan = dbKeuangan.filter(x => x.id !== pendingDeleteId);
            localStorage.setItem('jurnalKeuangan', JSON.stringify(dbKeuangan));
        } else {
            dbTabungan = dbTabungan.filter(x => x.id !== pendingDeleteId);
            localStorage.setItem('jurnalTabungan', JSON.stringify(dbTabungan));
        }

        if (document.getElementById('dataId').value === pendingDeleteId) resetForm();
        pendingDeleteId = null;
        
        renderView();
    }

    // Initialize display app state
    renderView();
</script>
